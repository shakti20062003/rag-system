<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Q&A</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --border: #222228;
    --border-hi: #333340;
    --text: #e8e8f0;
    --muted: #5a5a70;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --danger: #f87171;
    --claude: #6ee7b7;
    --llama: #fb923c;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .provider-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .provider-btn {
    padding: 5px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .provider-btn.active[data-p="mistral"] { background: rgba(110,231,183,0.15); color: var(--claude); }
  .provider-btn.active[data-p="llama"]  { background: rgba(251,146,60,0.15);  color: var(--llama); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.err { background: var(--danger); }

  /* Layout */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .upload-zone {
    border: 1px dashed var(--border-hi);
    border-radius: 8px;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(110,231,183,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .upload-icon { font-size: 22px; margin-bottom: 6px; }
  .upload-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .upload-text strong { color: var(--accent); display: block; font-size: 11px; margin-top: 4px; font-family: var(--font-mono); }

  .doc-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    animation: fadeSlide 0.25s ease;
  }

  .doc-item:hover { background: rgba(255,255,255,0.03); }

  .doc-icon { font-size: 14px; flex-shrink: 0; }
  .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .doc-chunks { font-family: var(--font-mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn-clear {
    width: 100%;
    padding: 7px;
    background: none;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 14px;
    max-width: 820px;
    animation: fadeSlide 0.2s ease;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .msg.user .msg-avatar { background: rgba(110,231,183,0.15); }
  .msg.assistant .msg-avatar { background: rgba(129,140,248,0.15); }

  .msg-body { flex: 1; }

  .msg-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .msg.user .msg-meta { justify-content: flex-end; }

  .provider-tag {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 0.05em;
  }

  .provider-tag.mistral { background: rgba(110,231,183,0.15); color: var(--claude); }
  .provider-tag.llama  { background: rgba(251,146,60,0.15);  color: var(--llama); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
  }

  .msg.user .msg-bubble {
    background: rgba(110,231,183,0.08);
    border: 1px solid rgba(110,231,183,0.15);
    color: var(--text);
  }

  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* Sources */
  .sources {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sources-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .source-chip {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .source-chip:hover { border-color: var(--border-hi); }

  .source-chip-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .source-chip-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); opacity: 0.5; }
  .empty-sub { font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* Input bar */
  .input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: flex-end;
    transition: border-color 0.15s;
    overflow: hidden;
  }

  .input-wrap:focus-within { border-color: var(--border-hi); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    max-height: 140px;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    flex-shrink: 0;
    color: #0d0d0f;
    font-weight: bold;
  }

  .send-btn:hover { background: #34d399; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Loader */
  .loader {
    display: flex;
    gap: 4px;
    padding: 6px 0;
  }

  .loader span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .loader span:nth-child(2) { animation-delay: 0.2s; }
  .loader span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Upload progress overlay */
  .upload-progress {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    text-align: center;
    padding: 6px 0;
    display: none;
  }

  .upload-progress.visible { display: block; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--border-hi);
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok   { border-color: var(--accent); color: var(--accent); }
  .toast.err  { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⟨/⟩</div>
    RAG_QA
  </div>
  <div class="header-controls">
    <div class="provider-toggle">
      <button class="provider-btn active" data-p="mistral" onclick="setProvider('mistral')">MISTRAL</button>
      <button class="provider-btn" data-p="llama" onclick="setProvider('llama')">LLAMA</button>
    </div>
    <div class="status-dot" id="statusDot" title="API status"></div>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Documents</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".txt,.pdf,.md" multiple onchange="handleFiles(this.files)"/>
        <div class="upload-icon">📄</div>
        <div class="upload-text">
          Drop files or click to upload
          <strong>TXT · PDF · MD</strong>
        </div>
      </div>
      <div class="upload-progress" id="uploadProgress">uploading...</div>
    </div>
    <div class="doc-list" id="docList"></div>
    <div class="sidebar-footer">
      <button class="btn-clear" onclick="clearDocs()">✕ clear vector store</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◈</div>
        <div class="empty-title">No conversation yet</div>
        <div class="empty-sub">Upload documents in the sidebar, then ask questions grounded in their content.</div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea
          id="queryInput"
          rows="1"
          placeholder="Ask a question about your documents…"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendQuery()" title="Send">↑</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://localhost:8000";
let provider = "mistral";
let docs = [];

// ── Provider ──────────────────────────────────────────────
function setProvider(p) {
  provider = p;
  document.querySelectorAll(".provider-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.p === p);
  });
}

// ── Health ────────────────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById("statusDot");
  try {
    const r = await fetch(`${API}/health`);
    dot.className = r.ok ? "status-dot ok" : "status-dot err";
  } catch {
    dot.className = "status-dot err";
  }
}

checkHealth();
setInterval(checkHealth, 15000);

// ── Upload ────────────────────────────────────────────────
const zone = document.getElementById("uploadZone");
zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag"); });
zone.addEventListener("dragleave", () => zone.classList.remove("drag"));
zone.addEventListener("drop", e => {
  e.preventDefault();
  zone.classList.remove("drag");
  handleFiles(e.dataTransfer.files);
});

async function handleFiles(files) {
  if (!files.length) return;
  const prog = document.getElementById("uploadProgress");
  prog.textContent = `uploading ${files.length} file(s)…`;
  prog.classList.add("visible");

  const fd = new FormData();
  for (const f of files) fd.append("files", f);

  try {
    const r = await fetch(`${API}/documents/upload`, { method: "POST", body: fd });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || "Upload failed"); }
    const results = await r.json();
    results.forEach(d => {
      docs.push(d);
      addDocItem(d);
    });
    toast(`✓ ${results.length} file(s) ingested`, "ok");
  } catch (e) {
    toast(e.message, "err");
  } finally {
    prog.classList.remove("visible");
    document.getElementById("fileInput").value = "";
  }
}

function addDocItem(d) {
  const list = document.getElementById("docList");
  const item = document.createElement("div");
  item.className = "doc-item";
  const ext = d.filename.split(".").pop().toUpperCase();
  const icon = ext === "PDF" ? "📕" : ext === "MD" ? "📝" : "📄";
  item.innerHTML = `
    <span class="doc-icon">${icon}</span>
    <span class="doc-name" title="${d.filename}">${d.filename}</span>
    <span class="doc-chunks">${d.chunks_created}c</span>
  `;
  list.appendChild(item);
}

// ── Clear ─────────────────────────────────────────────────
async function clearDocs() {
  try {
    await fetch(`${API}/documents/clear`, { method: "DELETE" });
    docs = [];
    document.getElementById("docList").innerHTML = "";
    toast("Vector store cleared", "ok");
  } catch { toast("Failed to clear", "err"); }
}

// ── Query ─────────────────────────────────────────────────
async function sendQuery() {
  const input = document.getElementById("queryInput");
  const q = input.value.trim();
  if (!q) return;

  input.value = "";
  autoResize(input);
  document.getElementById("sendBtn").disabled = true;

  hideEmpty();
  appendMsg("user", q);
  const loaderEl = appendLoader();

  try {
    const r = await fetch(`${API}/query/`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, provider, top_k: 4 }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || "Query failed"); }
    const data = await r.json();
    loaderEl.remove();
    appendAssistant(data);
  } catch (e) {
    loaderEl.remove();
    appendMsg("assistant", `⚠ ${e.message}`, null);
  } finally {
    document.getElementById("sendBtn").disabled = false;
    input.focus();
  }
}

function hideEmpty() {
  const e = document.getElementById("emptyState");
  if (e) e.remove();
}

function appendMsg(role, text) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const avatar = role === "user" ? "👤" : "◈";
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-meta">${role === "user" ? "you" : "system"}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendAssistant(data) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg assistant";

  const sourcesHtml = data.sources.length ? `
    <div class="sources">
      <div class="sources-label">▸ sources (${data.sources.length})</div>
      ${data.sources.map(s => `
        <div class="source-chip">
          <div class="source-chip-header">📄 ${escHtml(s.filename)}</div>
          <div class="source-chip-text">${escHtml(s.content)}</div>
        </div>
      `).join("")}
    </div>
  ` : "";

  const tagClass = data.provider;
  div.innerHTML = `
    <div class="msg-avatar">◈</div>
    <div class="msg-body">
      <div class="msg-meta">
        assistant
        <span class="provider-tag ${tagClass}">${data.provider.toUpperCase()}</span>
      </div>
      <div class="msg-bubble">${escHtml(data.answer)}</div>
      ${sourcesHtml}
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendLoader() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.innerHTML = `
    <div class="msg-avatar">◈</div>
    <div class="msg-body">
      <div class="loader"><span></span><span></span><span></span></div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

// ── Utils ─────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

let toastTimer;
function toast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "toast", 3000);
}
</script>
</body>
</html>
